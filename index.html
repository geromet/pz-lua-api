<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Zomboid Lua API</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-one-dark.min.css">
<style>
  :root {
    --bg:#1a1a1a; --bg2:#242424; --bg3:#2e2e2e; --border:#3a3a3a;
    --text:#d4d4d4; --text-dim:#777;
    --accent:#c17f24; --accent2:#4a9eff; --green:#6abf69;
    --col-exposed:#c17f24; --col-tagged:#6abf69;
    --sidebar-w:320px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* ── Header ── */
  #header{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0}
  #header h1{font-size:15px;font-weight:600;color:var(--accent);white-space:nowrap}
  #global-search{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:5px 10px;color:var(--text);font-size:13px;outline:none}
  #global-search:focus{border-color:var(--accent)}
  #global-search::placeholder{color:var(--text-dim)}
  .hstat{font-size:11px;color:var(--text-dim);white-space:nowrap;display:flex;align-items:center;gap:4px}
  .hstat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  #btn-folder{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:5px 10px;color:var(--text-dim);font-size:12px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px}
  #btn-folder:hover{border-color:var(--accent2);color:var(--accent2)}
  #btn-folder.loaded{border-color:var(--green);color:var(--green)}

  /* ── Tabs ── */
  #tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
  .tab{padding:7px 18px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-dim);font-size:13px;user-select:none}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  /* ── Main layout ── */
  #main{display:flex;flex:1;overflow:hidden}

  /* ── Sidebar ── */
  #sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  #filter-legend{padding:6px 10px 4px;font-size:11px;color:var(--text-dim);display:flex;gap:10px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:4px}
  #sidebar-filters{padding:5px 8px;display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
  .filter-btn{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:3px 7px;font-size:11px;cursor:pointer;color:var(--text-dim);user-select:none;white-space:nowrap}
  .filter-btn:hover{color:var(--text);border-color:#555}
  .filter-btn.active{color:#fff}
  .filter-btn[data-filter="all"].active{background:#444;border-color:#666}
  .filter-btn[data-filter="both"].active{background:#2a2a12;border-color:var(--accent);color:var(--accent)}
  .filter-btn[data-filter="exposed"].active{background:#2a2a12;border-color:var(--col-exposed);color:var(--col-exposed)}
  .filter-btn[data-filter="tagged"].active{background:#1a2e1a;border-color:var(--col-tagged);color:var(--col-tagged)}
  .filter-btn[data-filter="enum"].active{background:#1a1a2e;border-color:#8888ff;color:#8888ff}
  .filter-btn[data-filter="has-tagged-methods"].active{background:#1a2e2a;border-color:var(--accent2);color:var(--accent2)}

  /* ── Fold depth controls ── */
  #fold-depth-controls{padding:4px 8px;display:flex;align-items:center;gap:4px;border-bottom:1px solid var(--border)}
  .fdc-btn{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:2px 8px;font-size:11px;cursor:pointer;color:var(--text-dim);user-select:none;font-family:monospace}
  .fdc-btn:hover{color:var(--text);border-color:#555}
  #fdc-depth-label{font-size:10px;color:var(--text-dim);margin:0 2px;flex:1;text-align:center}

  #class-count{padding:4px 10px;font-size:11px;color:var(--text-dim);border-bottom:1px solid var(--border)}
  #class-list{flex:1;overflow-y:auto}

  /* ── Class items (in tree and flat) ── */
  .class-item{padding:4px 10px;cursor:pointer;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;gap:6px;user-select:none;min-width:0}
  .class-item:hover{background:var(--bg3)}
  .class-item.active{background:#25220f;border-left:3px solid var(--accent);padding-left:7px}
  .ci-text{flex:1;min-width:0}
  .ci-name{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ci-pkg{font-size:10px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ci-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
  .ci-dots{display:flex;gap:3px;flex-shrink:0}
  .ci-match{font-size:10px;color:var(--accent2);white-space:nowrap}
  .dot{width:7px;height:7px;border-radius:50%}
  .dot-exposed{background:var(--col-exposed)}.dot-tagged{background:var(--col-tagged)}.dot-blue{background:var(--accent2)}
  .dot-empty{background:transparent;border:1px solid var(--border)}
  .tag{font-size:10px;border-radius:3px;padding:1px 4px;flex-shrink:0}
  .tag-enum{background:#1a1a3a;color:#8888ff}
  .tag-static{background:#1e2a2a;color:#50b4b4;border:1px solid #306060;font-size:10px;border-radius:3px;padding:1px 4px}

  /* ── Namespace tree ── */
  .pkg-node{min-width:0}
  .pkg-label{padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;user-select:none;font-size:12px;color:var(--text-dim);border-bottom:1px solid #1c1c1c}
  .pkg-label:hover{background:var(--bg3);color:var(--text)}
  .pkg-arrow{font-size:9px;width:10px;flex-shrink:0;color:#555}
  .pkg-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pkg-count{font-size:10px;color:#444}
  .pkg-contents{padding-left:14px}
  .pkg-contents.pkg-folded{display:none}
  /* indent depth visual cue */
  .pkg-contents .pkg-label{border-left:1px solid #333}

  /* ── Content area ── */
  #content{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
  #loading{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:12px;color:var(--text-dim)}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #placeholder{display:flex;align-items:center;justify-content:center;flex:1;color:var(--text-dim);flex-direction:column;gap:8px}

  /* content sub-tabs */
  #content-tabs{display:none;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 14px;gap:0;flex-direction:row}
  #content-tabs.visible{display:flex}
  .ctab{padding:6px 14px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-dim);font-size:12px;user-select:none}
  .ctab:hover{color:var(--text)}
  .ctab.active{color:var(--accent2);border-bottom-color:var(--accent2)}

  /* detail panel */
  #detail-panel{flex:1;overflow-y:auto;padding:18px 20px;display:none}
  #detail-panel.visible{display:block}

  /* source panel */
  #source-panel{flex:1;display:none;flex-direction:column}
  #source-panel.visible{display:flex}

  /* ── Source toolbar ── */
  .source-toolbar{display:flex;align-items:center;gap:6px;padding:5px 12px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
  .stb-btn{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:3px 9px;color:var(--text-dim);font-size:11px;cursor:pointer;white-space:nowrap}
  .stb-btn:hover{color:var(--text);border-color:#555}
  .stb-sep{width:1px;height:14px;background:var(--border);margin:0 2px}

  /* source code */
  #source-loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text-dim);font-size:13px}
  #source-pre{flex:1;overflow:auto;margin:0!important;border-radius:0!important}
  #source-pre code{font-size:12.5px;line-height:1.55;font-family:'Cascadia Code','Fira Code','Consolas',monospace;display:block}

  /* ── Source folding ── */
  .src-line{display:block;white-space:pre;position:relative}
  .fold-btn{display:inline-block;width:13px;color:#444;cursor:pointer;user-select:none;font-size:9px;font-family:monospace;vertical-align:middle;margin-right:1px;text-align:center;flex-shrink:0}
  .fold-btn:hover{color:var(--accent2)}
  .fold-region.folded{display:none}
  .fold-ellipsis{display:none;color:#555;font-style:italic}
  .fold-hdr.folded .fold-ellipsis{display:inline}
  .src-line.highlight-line{background:rgba(193,127,36,.15)!important}
  .source-highlight-line{background:#2a2a00;display:block}

  /* ── Class detail styles ── */
  .class-header{margin-bottom:16px}
  .class-header h2{font-size:19px;font-weight:600;color:var(--accent);margin-bottom:3px}
  .class-header .fqn{font-size:12px;color:var(--text-dim);font-family:monospace;margin-bottom:8px}
  .class-header .badges{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:5px}
  .badge{font-size:11px;border-radius:3px;padding:2px 8px;font-weight:600}
  .badge-exposed{background:#2a2a12;color:var(--col-exposed);border:1px solid var(--col-exposed)}
  .badge-tagged{background:#1a2e1a;color:var(--col-tagged);border:1px solid var(--col-tagged)}
  .badge-no{background:var(--bg3);color:var(--text-dim);border:1px solid var(--border)}
  .badge-enum{background:#1a1a3a;color:#8888ff;border:1px solid #8888ff}
  .source-path{font-size:11px;color:var(--text-dim);font-family:monospace}

  .section{margin-bottom:24px}
  .section-header{display:flex;align-items:center;gap:10px;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--border)}
  .section-header h3{font-size:13px;font-weight:600}
  .section-header .count{font-size:12px;color:var(--text-dim)}
  .inline-search{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:4px 8px;color:var(--text);font-size:12px;outline:none;margin-left:auto;width:150px}
  .inline-search:focus{border-color:var(--accent2)}
  .inline-search::placeholder{color:var(--text-dim)}
  .group-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:7px 10px 3px;display:flex;align-items:center;gap:6px}
  .group-label.tagged-label{color:var(--col-tagged)}
  .group-label.other-label{color:#555}

  table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:2px}
  th{text-align:left;padding:5px 10px;font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
  td{padding:4px 10px;border-bottom:1px solid #222;vertical-align:top}
  tr:hover td{background:var(--bg2)}
  .method-link{color:var(--accent2);font-family:monospace;cursor:pointer;text-decoration:none}
  .method-link:hover{text-decoration:underline}
  .return-type{color:#b5cea8;font-family:monospace;font-size:12px}
  .params-cell{font-family:monospace;font-size:12px;color:var(--text-dim)}
  .param-type{color:#ce9178}.param-name{color:var(--text)}
  .field-name{color:var(--green);font-family:monospace}
  .field-type{color:#b5cea8;font-family:monospace;font-size:12px}
  .empty-msg{color:var(--text-dim);font-style:italic;padding:10px 0;font-size:13px}

  /* ── Globals tab ── */
  #globals-panel{display:none;flex-direction:column;overflow:hidden;flex:1}
  #globals-panel.visible{display:flex}
  #globals-header{padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0}
  #globals-search{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:6px 10px;color:var(--text);font-size:13px;outline:none;min-width:0}
  #globals-search:focus{border-color:var(--accent)}
  #globals-count{font-size:12px;color:var(--text-dim);white-space:nowrap}
  .gfold-btn{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:3px 7px;color:var(--text-dim);font-size:11px;cursor:pointer;font-family:monospace;white-space:nowrap}
  .gfold-btn:hover{color:var(--text);border-color:#555}
  #globals-table-wrap{flex:1;overflow-y:auto;padding:0 20px 20px}
  .gfn-name{color:var(--accent);font-family:monospace;font-weight:600}
  .globals-group-header{padding:9px 10px 4px!important;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border)!important;background:var(--bg2)!important;cursor:pointer;user-select:none}
  .globals-group-header:hover{background:var(--bg3)!important}
  .ggh-arrow{display:inline-block;width:12px;color:#555;font-size:9px;font-family:monospace}
  .globals-group-header .ggh-name{color:var(--text-dim)}
  .src-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:11px;padding:0 4px;line-height:1;font-family:monospace}
  .src-btn:hover{color:var(--accent2)}

  #globals-nav{padding:8px 20px;display:none;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2)}
  #globals-nav.visible{display:flex}
  #globals-back-btn{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:4px 10px;color:var(--text-dim);font-size:12px;cursor:pointer}
  #globals-back-btn:hover{color:var(--text);border-color:#555}
  #globals-src-title{font-family:monospace;font-size:13px;color:var(--accent2)}
  #globals-source-wrap{display:none;flex:1;flex-direction:column;overflow:hidden}
  #globals-source-wrap.visible{display:flex}
  #globals-src-pre{flex:1;overflow:auto;margin:0!important;border-radius:0!important}
  #globals-src-pre code{font-size:12.5px;line-height:1.55;font-family:'Cascadia Code','Fira Code','Consolas',monospace;display:block}

  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:var(--bg2)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:#555}
</style>
</head>
<body>

<div id="header">
  <h1>PZ Lua API</h1>
  <input id="global-search" type="text" placeholder="Search classes, methods, fields… (press /)" autocomplete="off">
  <span class="hstat"><span class="hstat-dot" style="background:var(--col-exposed)"></span><span id="stat-exposed">…</span> setExposed</span>
  <span class="hstat"><span class="hstat-dot" style="background:var(--col-tagged)"></span><span id="stat-tagged">…</span> @UsedFromLua</span>
  <span class="hstat" id="stat-globals" style="color:var(--text-dim)"></span>
  <button id="btn-folder" title="Load source files from your local Project Zomboid installation (overrides pre-shipped sources)">📁 Local sources</button>
</div>

<div id="tabs">
  <div class="tab active" data-tab="classes">Classes</div>
  <div class="tab" data-tab="globals">Global Functions</div>
</div>

<div id="main">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="filter-legend">
      <span class="legend-item"><span class="dot dot-exposed"></span> setExposed</span>
      <span class="legend-item"><span class="dot dot-tagged"></span> @UsedFromLua</span>
      <span class="legend-item"><span class="dot dot-blue"></span> tagged methods</span>
    </div>
    <div id="sidebar-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="both">Both</button>
      <button class="filter-btn" data-filter="exposed">setExposed only</button>
      <button class="filter-btn" data-filter="tagged">@UsedFromLua only</button>
      <button class="filter-btn" data-filter="has-tagged-methods">Has tagged methods</button>
      <button class="filter-btn" data-filter="enum">Enums</button>
    </div>
    <div id="fold-depth-controls">
      <button class="fdc-btn" id="btn-fold-all-pkg" title="Fold all packages">▶▶</button>
      <button class="fdc-btn" id="btn-fold-less" title="Fold one level deeper">−</button>
      <span id="fdc-depth-label">all open</span>
      <button class="fdc-btn" id="btn-fold-more" title="Unfold one level deeper">+</button>
      <button class="fdc-btn" id="btn-unfold-all-pkg" title="Unfold all packages">▼▼</button>
    </div>
    <div id="class-count"></div>
    <div id="class-list"></div>
  </div>

  <!-- Content -->
  <div id="content">
    <div id="loading"><div class="spinner"></div><span>Loading…</span></div>
    <div id="placeholder" style="display:none"><span>Select a class from the list</span><span style="font-size:12px;color:var(--text-dim)">↑↓ arrows navigate · / to search</span></div>

    <!-- Sub-tabs (Detail / Source) shown when a class is selected -->
    <div id="content-tabs">
      <div class="ctab active" data-ctab="detail">Detail</div>
      <div class="ctab" data-ctab="source">Source</div>
    </div>

    <div id="detail-panel"></div>

    <div id="source-panel">
      <div class="source-toolbar" id="source-toolbar" style="display:none">
        <button class="stb-btn" id="src-fold-all">Fold All</button>
        <span class="stb-sep"></span>
        <button class="stb-btn" id="src-unfold-all">Unfold All</button>
        <span class="stb-sep"></span>
        <button class="stb-btn" id="src-fold-methods">Fold to Methods</button>
      </div>
      <span id="source-loading" style="display:none">Loading source…</span>
      <pre id="source-pre"><code id="source-code" class="language-java"></code></pre>
    </div>

    <!-- Globals panel replaces detail/source when globals tab active -->
    <div id="globals-panel">
      <div id="globals-header">
        <input id="globals-search" type="text" placeholder="Search global functions…" autocomplete="off">
        <span id="globals-count"></span>
        <button class="gfold-btn" id="btn-unfold-groups" title="Unfold all groups">▼▼</button>
        <button class="gfold-btn" id="btn-fold-groups" title="Fold all groups">▶▶</button>
      </div>
      <div id="globals-nav">
        <button id="globals-back-btn">← Back to functions</button>
        <span id="globals-src-title"></span>
      </div>
      <div id="globals-table-wrap"></div>
      <div id="globals-source-wrap">
        <div class="source-toolbar">
          <button class="stb-btn" id="gsrc-fold-all">Fold All</button>
          <span class="stb-sep"></span>
          <button class="stb-btn" id="gsrc-unfold-all">Unfold All</button>
          <span class="stb-sep"></span>
          <button class="stb-btn" id="gsrc-fold-methods">Fold to Methods</button>
        </div>
        <pre id="globals-src-pre"><code id="globals-src-code" class="language-java"></code></pre>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────
let API = null;
let currentTab    = 'classes';
let currentCtab   = 'detail';
let currentFilter = 'all';
let currentSearch = '';
let currentClass  = null;
let filteredResults = [];
let methodSearch  = '';
let fieldSearch   = '';

const sourceCache  = {};
let localDirHandle = null;

// Global functions group folding
const foldedGlobalGroups = new Set();

// Class namespace tree folding
const foldedPackages = new Set();
let foldDepth = Infinity; // Infinity = fully open

// ── Load API ──────────────────────────────────────────────────────────────
fetch('./lua_api.json')
  .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
  .then(data => {
    API = data;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('placeholder').style.display = 'flex';
    init();
  })
  .catch(e => {
    document.getElementById('loading').innerHTML =
      `<div style="color:#e06c75;text-align:center">Failed to load lua_api.json<br><small>${e.message}</small></div>`;
  });

function init() {
  const m = API._meta;
  document.getElementById('stat-exposed').textContent = m.set_exposed_count;
  document.getElementById('stat-tagged').textContent  = m.lua_tagged_count;
  document.getElementById('stat-globals').textContent = `${m.total_global_functions} globals`;
  buildClassList();
  setupEvents();
  if (location.hash) {
    const val = decodeURIComponent(location.hash.slice(1));
    if (val === 'globals') switchTab('globals');
    else selectClass(val);
  }
}

// ── Source fetching ───────────────────────────────────────────────────────
async function getLocalFileHandle(relPath) {
  if (!localDirHandle) return null;
  const parts = relPath.split('/');
  let dir = localDirHandle;
  try {
    for (let i = 0; i < parts.length - 1; i++) dir = await dir.getDirectoryHandle(parts[i]);
    return await dir.getFileHandle(parts[parts.length - 1]);
  } catch { return null; }
}

async function fetchSource(relPath) {
  if (sourceCache[relPath]) return sourceCache[relPath];
  const fh = await getLocalFileHandle(relPath);
  if (fh) { const text = await (await fh.getFile()).text(); sourceCache[relPath] = text; return text; }
  const resp = await fetch('./sources/' + relPath);
  if (!resp.ok) throw new Error(`Source not found: ${relPath}`);
  const text = await resp.text();
  sourceCache[relPath] = text;
  return text;
}

// ── Source folding helpers ────────────────────────────────────────────────
function buildFoldRegions(text) {
  const lines = text.split('\n');
  const regions = [];
  const stack = [];
  const MIN_FOLD_LINES = 4;

  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    let inStr = false, inChar = false, inLineC = false, inBlockC = false;
    let opens = 0, closes = 0;

    for (let j = 0; j < raw.length; j++) {
      const c = raw[j];
      if (inLineC) break;
      if (inBlockC) { if (c === '*' && raw[j+1] === '/') { inBlockC = false; j++; } continue; }
      if (inStr)    { if (c === '\\') j++; else if (c === '"') inStr = false; continue; }
      if (inChar)   { if (c === '\\') j++; else if (c === "'") inChar = false; continue; }
      if (c === '/' && raw[j+1] === '/') { inLineC = true; continue; }
      if (c === '/' && raw[j+1] === '*') { inBlockC = true; j++; continue; }
      if (c === '"') { inStr = true; continue; }
      if (c === "'") { inChar = true; continue; }
      if (c === '{') opens++;
      if (c === '}') closes++;
    }
    for (let k = 0; k < opens; k++)  stack.push({startLine: i, type: classifyLine(raw)});
    for (let k = 0; k < closes; k++) {
      if (stack.length > 0) {
        const {startLine, type} = stack.pop();
        if (i - startLine >= MIN_FOLD_LINES) regions.push({startLine, endLine: i, type});
      }
    }
  }
  return regions;
}

function classifyLine(line) {
  const t = line.trim();
  if (/\b(class|interface|enum)\b/.test(t)) return 'class';
  if (/^(if|else|for|while|try|catch|finally|switch|do)\b/.test(t)) return 'block';
  if (t.includes('(') && t.includes(')')) return 'method';
  return 'other';
}

function wrapLines(html) {
  let result = `<span class="src-line" id="L1">`;
  let n = 1, inTag = false;
  for (let i = 0; i < html.length; i++) {
    const c = html[i];
    if      (c === '<') { inTag = true;  result += c; }
    else if (c === '>') { inTag = false; result += c; }
    else if (c === '\n' && !inTag) { result += `</span><span class="src-line" id="L${++n}">`; }
    else result += c;
  }
  return result + '</span>';
}

function injectFoldRegions(codeEl, regions) {
  // Build line map from the already-set innerHTML
  const lineMap = new Map();
  codeEl.querySelectorAll('.src-line').forEach(el => {
    const n = parseInt(el.id.slice(1));
    if (!isNaN(n)) lineMap.set(n, el);
  });

  // Process bottom-to-top so DOM insertions don't shift siblings
  const sorted = [...regions].sort((a, b) => b.startLine - a.startLine);

  for (const {startLine, endLine, type} of sorted) {
    const startEl = lineMap.get(startLine + 1);
    const endEl   = lineMap.get(endLine + 1);
    if (!startEl || !endEl || startEl.querySelector('.fold-btn')) continue;

    // Add fold button + ellipsis to start line
    const btn = document.createElement('span');
    btn.className = 'fold-btn'; btn.textContent = '▼';
    btn.dataset.foldId = startLine + 1;
    startEl.insertBefore(btn, startEl.firstChild);
    startEl.classList.add('fold-hdr');
    startEl.dataset.foldEnd = endLine + 1;
    startEl.dataset.foldType = type;

    const ell = document.createElement('span');
    ell.className = 'fold-ellipsis'; ell.textContent = ' … }';
    startEl.appendChild(ell);

    // Wrap body: all siblings between startEl and endEl (exclusive)
    const wrapper = document.createElement('span');
    wrapper.className = 'fold-region';
    wrapper.id = `FR${startLine + 1}`;

    const toWrap = [];
    let cur = startEl.nextSibling;
    while (cur && cur !== endEl) { toWrap.push(cur); cur = cur.nextSibling; }
    if (toWrap.length) {
      startEl.parentNode.insertBefore(wrapper, toWrap[0]);
      toWrap.forEach(n => wrapper.appendChild(n));
    }
  }

  // Single delegated click handler
  codeEl.addEventListener('click', e => {
    const btn = e.target.closest('.fold-btn');
    if (!btn) return;
    const id   = parseInt(btn.dataset.foldId);
    const hdr  = lineMap.get(id);
    const region = codeEl.querySelector(`#FR${id}`);
    if (!region) return;
    const folded = region.classList.toggle('folded');
    btn.textContent = folded ? '▶' : '▼';
    if (hdr) hdr.classList.toggle('folded', folded);
  });
}

function renderFoldableSource(rawText, codeEl) {
  codeEl.textContent = rawText;
  Prism.highlightElement(codeEl);
  codeEl.innerHTML = wrapLines(codeEl.innerHTML);
  const regions = buildFoldRegions(rawText);
  if (regions.length) injectFoldRegions(codeEl, regions);
}

function foldAllInEl(codeEl, mode) {
  codeEl.querySelectorAll('.fold-region').forEach(r => {
    if (mode === 'methods') {
      const hdr = codeEl.querySelector(`.fold-hdr[data-fold-type]`);
      const id  = r.id.replace('FR', '');
      const hdrEl = codeEl.querySelector(`#L${id}`);
      if (!hdrEl || hdrEl.dataset.foldType !== 'method') return;
    }
    r.classList.add('folded');
  });
  codeEl.querySelectorAll('.fold-hdr').forEach(hdr => {
    if (mode === 'methods' && hdr.dataset.foldType !== 'method') return;
    hdr.classList.add('folded');
    const btn = hdr.querySelector('.fold-btn');
    if (btn) btn.textContent = '▶';
  });
}

function unfoldAllInEl(codeEl) {
  codeEl.querySelectorAll('.fold-region').forEach(r => r.classList.remove('folded'));
  codeEl.querySelectorAll('.fold-hdr').forEach(hdr => {
    hdr.classList.remove('folded');
    const btn = hdr.querySelector('.fold-btn');
    if (btn) btn.textContent = '▼';
  });
}

// ── Source display ────────────────────────────────────────────────────────
async function showSource(cls, jumpToMethod) {
  switchCtab('source');
  const toolbar   = document.getElementById('source-toolbar');
  const loadingEl = document.getElementById('source-loading');
  const codeEl    = document.getElementById('source-code');
  const preEl     = document.getElementById('source-pre');

  toolbar.style.display = 'none';
  loadingEl.style.display = 'block';
  codeEl.textContent = '';

  let text;
  try {
    text = await fetchSource(cls.source_file);
  } catch (e) {
    loadingEl.style.display = 'none';
    codeEl.textContent = `// Source not available.\n// Run prepare_sources.py, or click "📁 Local sources"\n// and pick your projectzomboid folder.\n\n// Error: ${e.message}`;
    Prism.highlightElement(codeEl);
    return;
  }

  loadingEl.style.display = 'none';
  renderFoldableSource(text, codeEl);
  toolbar.style.display = '';

  if (jumpToMethod) scrollToMethod(text, jumpToMethod, preEl, codeEl);
  else preEl.scrollTop = 0;
}

function scrollToMethod(sourceText, methodName, panelEl, codeEl) {
  if (!panelEl) panelEl = document.getElementById('source-pre');
  if (!codeEl)  codeEl  = document.getElementById('source-code');

  const lines = sourceText.split('\n');
  const re = new RegExp(`(?:public|protected|private|static|\\s)\\s+\\S[^\\n]*?\\b${methodName}\\s*\\(`);
  let lineIdx = -1;
  for (let i = 0; i < lines.length; i++) { if (re.test(lines[i])) { lineIdx = i; break; } }
  if (lineIdx === -1) {
    for (let i = 0; i < lines.length; i++) { if (lines[i].includes(methodName + '(')) { lineIdx = i; break; } }
  }
  if (lineIdx === -1) return;

  const lineEl = codeEl.querySelector(`#L${lineIdx + 1}`);
  if (lineEl) {
    // Auto-unfold parent fold regions
    let p = lineEl.parentElement;
    while (p && p !== codeEl) {
      if (p.classList.contains('fold-region')) {
        p.classList.remove('folded');
        const id = p.id.replace('FR','');
        const hdr = codeEl.querySelector(`#L${id}`);
        if (hdr) { hdr.classList.remove('folded'); const b = hdr.querySelector('.fold-btn'); if (b) b.textContent = '▼'; }
      }
      p = p.parentElement;
    }
    lineEl.scrollIntoView({behavior:'auto', block:'center'});
    lineEl.classList.add('highlight-line');
    setTimeout(() => lineEl.classList.remove('highlight-line'), 2000);
  } else {
    const lh = parseFloat(getComputedStyle(codeEl).lineHeight) || 19;
    panelEl.scrollTop = Math.max(0, lineIdx * lh - 80);
  }
}

// ── Local folder picker ───────────────────────────────────────────────────
document.getElementById('btn-folder').addEventListener('click', async () => {
  if (!('showDirectoryPicker' in window)) {
    alert('Your browser does not support the File System Access API.\nTry Chrome or Edge.\n\nPre-shipped sources will be used instead.');
    return;
  }
  try {
    localDirHandle = await window.showDirectoryPicker({ mode: 'read' });
    Object.keys(sourceCache).forEach(k => delete sourceCache[k]);
    const btn = document.getElementById('btn-folder');
    btn.textContent = `✓ ${localDirHandle.name}`;
    btn.classList.add('loaded');
    if (currentClass && currentCtab === 'source') showSource(API.classes[currentClass]);
  } catch { /* user cancelled */ }
});

// ── Class filter helper ───────────────────────────────────────────────────
function passesCurrentFilter(fqn, cls) {
  if (currentFilter === 'both'               && !(cls.set_exposed && cls.lua_tagged))    return false;
  if (currentFilter === 'exposed'            && !(cls.set_exposed && !cls.lua_tagged))   return false;
  if (currentFilter === 'tagged'             && !(cls.lua_tagged && !cls.set_exposed))   return false;
  if (currentFilter === 'enum'               && !cls.is_enum)                            return false;
  if (currentFilter === 'has-tagged-methods' && !hasTaggedMethods(cls))                  return false;
  return true;
}

function hasTaggedMethods(cls) { return cls.methods.some(m => m.lua_tagged); }

function scoreClass(fqn, cls, search) {
  if (!search) return 1;
  const s = search.toLowerCase();
  const simple = fqn.split('.').pop().toLowerCase();
  const fqnL   = fqn.toLowerCase();
  if (simple === s)          return 100;
  if (simple.startsWith(s)) return 80;
  if (simple.includes(s))   return 60;
  if (fqnL.includes(s))     return 40;
  const mm = cls.methods.filter(m => m.name.toLowerCase().includes(s)).length;
  const fm = cls.fields.filter(f  => f.name.toLowerCase().includes(s)).length;
  if (mm > 0) return 20 + Math.min(mm, 10);
  if (fm > 0) return 10 + Math.min(fm, 5);
  return 0;
}

// ── Namespace tree ────────────────────────────────────────────────────────
function buildPackageTree() {
  const root = {children: {}, classes: []};
  for (const [fqn, cls] of Object.entries(API.classes)) {
    if (!passesCurrentFilter(fqn, cls)) continue;
    const parts = fqn.split('.');
    let node = root;
    for (let i = 0; i < parts.length - 1; i++) {
      const part = parts[i];
      if (!node.children[part]) {
        node.children[part] = {name: part, path: parts.slice(0, i+1).join('.'), children: {}, classes: []};
      }
      node = node.children[part];
    }
    node.classes.push({fqn, cls});
  }
  return root;
}

function countClasses(node) {
  let n = node.classes.length;
  for (const c of Object.values(node.children)) n += countClasses(c);
  return n;
}

function renderPackageTreeHTML(node, depth) {
  let html = '';
  const children = Object.values(node.children).sort((a, b) => a.name.localeCompare(b.name));
  for (const child of children) {
    const total = countClasses(child);
    if (!total) continue;
    const folded = foldedPackages.has(child.path) || depth >= foldDepth;
    html += `<div class="pkg-node">
      <div class="pkg-label" data-path="${esc(child.path)}">
        <span class="pkg-arrow">${folded ? '▶' : '▼'}</span>
        <span class="pkg-name">${esc(child.name)}</span>
        <span class="pkg-count">${total}</span>
      </div>
      <div class="pkg-contents${folded ? ' pkg-folded' : ''}">
        ${renderPackageTreeHTML(child, depth + 1)}
        ${renderClassItemsHTML(child.classes, false)}
      </div>
    </div>`;
  }
  html += renderClassItemsHTML(node.classes, false);
  return html;
}

function renderClassItemsHTML(classes, showPkg) {
  if (!classes.length) return '';
  const sorted = [...classes].sort((a, b) => a.fqn.split('.').pop().localeCompare(b.fqn.split('.').pop()));
  return sorted.map(({fqn, cls}) => {
    const simple = fqn.split('.').pop();
    const htm    = hasTaggedMethods(cls);
    const pkg    = showPkg ? `<div class="ci-pkg">${esc(fqn.split('.').slice(0,-1).join('.'))}</div>` : '';
    return `<div class="class-item${fqn === currentClass ? ' active' : ''}" data-fqn="${esc(fqn)}">
      <div class="ci-text">
        <div class="ci-name">${esc(simple)}${cls.is_enum ? ` <span class="tag tag-enum">enum</span>` : ''}</div>
        ${pkg}
      </div>
      <div class="ci-dots">
        <span class="dot ${cls.set_exposed ? 'dot-exposed' : 'dot-empty'}" title="${cls.set_exposed ? 'setExposed' : 'not setExposed'}"></span>
        <span class="dot ${cls.lua_tagged  ? 'dot-tagged'  : 'dot-empty'}" title="${cls.lua_tagged  ? '@UsedFromLua' : 'not @UsedFromLua'}"></span>
        <span class="dot ${htm             ? 'dot-blue'    : 'dot-empty'}" title="${htm             ? 'has tagged methods' : 'no tagged methods'}"></span>
      </div>
    </div>`;
  }).join('');
}

function collectClassesFromTree(node, out) {
  const children = Object.values(node.children).sort((a, b) => a.name.localeCompare(b.name));
  for (const c of children) collectClassesFromTree(c, out);
  const sorted = [...node.classes].sort((a, b) => a.fqn.split('.').pop().localeCompare(b.fqn.split('.').pop()));
  sorted.forEach(({fqn, cls}) => out.push({fqn, cls, score: 1, matchInfo: null}));
}

function expandPackagePath(fqn) {
  const parts = fqn.split('.');
  for (let i = 1; i < parts.length; i++) foldedPackages.delete(parts.slice(0, i).join('.'));
}

function togglePackage(path) {
  if (foldedPackages.has(path)) foldedPackages.delete(path);
  else foldedPackages.add(path);
  buildClassList();
}

function getMaxPackageDepth() {
  let max = 0;
  for (const fqn of Object.keys(API.classes)) max = Math.max(max, fqn.split('.').length - 1);
  return max;
}

function updateDepthLabel() {
  const label = document.getElementById('fdc-depth-label');
  if (!label) return;
  label.textContent = foldDepth === Infinity ? 'all open' : `depth ${foldDepth}`;
}

function adjustFoldDepth(delta) {
  const maxD = getMaxPackageDepth();
  if (delta < 0) foldDepth = foldDepth === Infinity ? maxD - 1 : Math.max(0, foldDepth - 1);
  else           foldDepth = foldDepth >= maxD ? Infinity : foldDepth + 1;
  foldedPackages.clear();
  updateDepthLabel();
  buildClassList();
}

// ── Class list ────────────────────────────────────────────────────────────
function buildClassList() {
  const search = currentSearch.trim();

  if (search) {
    // Flat scored results when searching
    const results = [];
    for (const [fqn, cls] of Object.entries(API.classes)) {
      if (!passesCurrentFilter(fqn, cls)) continue;
      const score = scoreClass(fqn, cls, search);
      if (score === 0) continue;
      const s  = search.toLowerCase();
      const mm = cls.methods.filter(m => m.name.toLowerCase().includes(s)).length;
      const fm = cls.fields.filter(f  => f.name.toLowerCase().includes(s)).length;
      const matchInfo = (mm > 0 || fm > 0)
        ? [mm > 0 && `${mm} method${mm>1?'s':''}`, fm > 0 && `${fm} field${fm>1?'s':''}`].filter(Boolean).join(', ')
        : null;
      results.push({fqn, cls, score, matchInfo});
    }
    results.sort((a, b) => b.score !== a.score ? b.score - a.score : a.fqn.split('.').pop().localeCompare(b.fqn.split('.').pop()));
    filteredResults = results;
    document.getElementById('class-count').textContent = `${results.length} classes`;

    const list = document.getElementById('class-list');
    const frag = document.createDocumentFragment();
    list.innerHTML = '';
    for (const {fqn, cls, matchInfo} of results) {
      const parts  = fqn.split('.');
      const simple = parts.pop();
      const pkg    = parts.join('.');
      const htm    = hasTaggedMethods(cls);
      const div    = document.createElement('div');
      div.className = 'class-item' + (fqn === currentClass ? ' active' : '');
      div.dataset.fqn = fqn;
      div.innerHTML =
        `<div class="ci-text"><div class="ci-name">${esc(simple)}${cls.is_enum?` <span class="tag tag-enum">enum</span>`:''}</div><div class="ci-pkg">${esc(pkg)}</div></div>` +
        `<div class="ci-right"><div class="ci-dots">` +
        `<span class="dot ${cls.set_exposed?'dot-exposed':'dot-empty'}"></span>` +
        `<span class="dot ${cls.lua_tagged ?'dot-tagged' :'dot-empty'}"></span>` +
        `<span class="dot ${htm           ?'dot-blue'   :'dot-empty'}"></span>` +
        `</div>${matchInfo?`<span class="ci-match">${matchInfo}</span>`:''}</div>`;
      div.addEventListener('click', () => selectClass(fqn, matchInfo));
      frag.appendChild(div);
    }
    list.appendChild(frag);
    return;
  }

  // Namespace tree when not searching
  const root = buildPackageTree();
  filteredResults = [];
  collectClassesFromTree(root, filteredResults);
  document.getElementById('class-count').textContent = `${filteredResults.length} classes`;

  const list = document.getElementById('class-list');
  list.innerHTML = renderPackageTreeHTML(root, 0);

  list.querySelectorAll('.pkg-label').forEach(label => {
    label.addEventListener('click', () => togglePackage(label.dataset.path));
  });
  list.querySelectorAll('.class-item').forEach(item => {
    item.addEventListener('click', () => selectClass(item.dataset.fqn, null));
  });
}

// ── Navigation ────────────────────────────────────────────────────────────
function navigateList(dir) {
  if (!filteredResults.length || currentTab !== 'classes') return;
  const idx  = filteredResults.findIndex(r => r.fqn === currentClass);
  const next = idx === -1 ? (dir > 0 ? 0 : filteredResults.length - 1)
                          : (idx + dir + filteredResults.length) % filteredResults.length;
  const {fqn, matchInfo} = filteredResults[next];
  selectClass(fqn, matchInfo);
}

// ── Class selection ───────────────────────────────────────────────────────
function selectClass(fqn, matchInfo) {
  if (!API.classes[fqn]) return;
  currentClass = fqn;

  // Auto-expand the package path in tree mode
  if (!currentSearch.trim()) {
    expandPackagePath(fqn);
    buildClassList();
  }

  if (matchInfo && currentSearch) {
    const s = currentSearch.toLowerCase();
    const cls = API.classes[fqn];
    methodSearch = cls.methods.some(m => m.name.toLowerCase().includes(s)) ? currentSearch : '';
    fieldSearch  = cls.fields.some(f  => f.name.toLowerCase().includes(s)) ? currentSearch : '';
  } else { methodSearch = ''; fieldSearch = ''; }

  location.hash = encodeURIComponent(fqn);
  document.querySelectorAll('.class-item').forEach(el => el.classList.toggle('active', el.dataset.fqn === fqn));
  document.querySelector('.class-item.active')?.scrollIntoView({ block: 'nearest' });

  document.getElementById('placeholder').style.display = 'none';
  showGlobalsPanel(false);
  document.getElementById('content-tabs').classList.add('visible');
  renderClassDetail(fqn);
  if (currentCtab === 'source') showSource(API.classes[fqn]);
}

// ── Content tab switching ─────────────────────────────────────────────────
function switchCtab(name) {
  currentCtab = name;
  document.querySelectorAll('.ctab').forEach(t => t.classList.toggle('active', t.dataset.ctab === name));
  document.getElementById('detail-panel').classList.toggle('visible', name === 'detail');
  document.getElementById('source-panel').classList.toggle('visible', name === 'source');
}

// ── Class detail rendering ────────────────────────────────────────────────
function renderClassDetail(fqn) {
  const cls    = API.classes[fqn];
  const simple = fqn.split('.').pop();
  const panel  = document.getElementById('detail-panel');

  panel.innerHTML = `
    <div class="class-header">
      <h2>${esc(simple)}</h2>
      <div class="fqn">${esc(fqn)}</div>
      <div class="badges">
        <span class="badge ${cls.set_exposed?'badge-exposed':'badge-no'}">${cls.set_exposed?'setExposed':'not setExposed'}</span>
        <span class="badge ${cls.lua_tagged ?'badge-tagged':'badge-no'}">${cls.lua_tagged ?'@UsedFromLua':'not @UsedFromLua'}</span>
        ${cls.is_enum?'<span class="badge badge-enum">enum</span>':''}
      </div>
      <div class="source-path">${esc(cls.source_file)}</div>
    </div>
    <div class="section">
      <div class="section-header">
        <h3>Methods</h3><span class="count" id="method-count">${cls.methods.length}</span>
        ${cls.methods.length?`<input class="inline-search" id="method-search-inp" type="text" placeholder="Filter…" value="${esc(methodSearch)}" autocomplete="off">`:''}
      </div>
      <div id="methods-wrap"></div>
    </div>
    <div class="section">
      <div class="section-header">
        <h3>${cls.is_enum?'Constants':'Fields'}</h3><span class="count" id="field-count">${cls.fields.length}</span>
        ${cls.fields.length&&!cls.is_enum?`<input class="inline-search" id="field-search-inp" type="text" placeholder="Filter…" value="${esc(fieldSearch)}" autocomplete="off">`:''}
      </div>
      <div id="fields-wrap"></div>
    </div>`;

  switchCtab('detail');
  refreshMethods(cls);
  refreshFields(cls);

  const mi = document.getElementById('method-search-inp');
  if (mi) { mi.addEventListener('input', () => { methodSearch = mi.value; refreshMethods(cls); }); if (methodSearch) mi.focus(); }
  const fi = document.getElementById('field-search-inp');
  if (fi) { fi.addEventListener('input', () => { fieldSearch  = fi.value; refreshFields(cls);  }); if (fieldSearch && !methodSearch) fi.focus(); }
}

function refreshMethods(cls) {
  const s = methodSearch.toLowerCase();
  const tagged = cls.methods.filter(m =>  m.lua_tagged && (!s || m.name.toLowerCase().includes(s)));
  const other  = cls.methods.filter(m => !m.lua_tagged && (!s || m.name.toLowerCase().includes(s)));
  document.getElementById('method-count').textContent = tagged.length + other.length;
  document.getElementById('methods-wrap').innerHTML   = renderMethodGroups(tagged, other, cls.set_exposed, cls);
}

function refreshFields(cls) {
  const s = fieldSearch.toLowerCase();
  const fields = cls.fields.filter(f => !s || f.name.toLowerCase().includes(s) || f.type.toLowerCase().includes(s));
  document.getElementById('field-count').textContent = fields.length;
  document.getElementById('fields-wrap').innerHTML   = renderFieldsTable(fields, cls.is_enum);
}

function renderMethodGroups(tagged, other, setExposed, cls) {
  if (!tagged.length && !other.length) return `<div class="empty-msg">No methods</div>`;
  // Split each group into instance vs static
  const taggedInst   = tagged.filter(m => !m.static);
  const taggedStatic = tagged.filter(m =>  m.static);
  const otherInst    = other.filter(m => !m.static);
  const otherStatic  = other.filter(m =>  m.static);
  let html = '';
  let topMargin = false;
  if (taggedInst.length) {
    html += `<div class="group-label tagged-label"><span class="dot dot-tagged"></span> @UsedFromLua (${taggedInst.length})</div>` + renderMethodsTable(taggedInst, cls);
    topMargin = true;
  }
  if (taggedStatic.length) {
    html += `<div class="group-label tagged-label" style="margin-top:${topMargin?8:0}px"><span class="dot dot-tagged"></span> @UsedFromLua — static (${taggedStatic.length})</div>` + renderMethodsTable(taggedStatic, cls);
    topMargin = true;
  }
  if (otherInst.length) {
    const lbl = setExposed ? `setExposed — callable (${otherInst.length})`
                           : `Not setExposed (${otherInst.length})`;
    html += `<div class="group-label other-label" style="margin-top:${topMargin?12:0}px"><span class="dot dot-empty"></span> ${lbl}</div>` + renderMethodsTable(otherInst, cls);
    topMargin = true;
  }
  if (otherStatic.length) {
    const lbl = setExposed ? `setExposed — static, not Lua-callable (${otherStatic.length})`
                           : `Not setExposed — static (${otherStatic.length})`;
    html += `<div class="group-label other-label" style="margin-top:${topMargin?8:0}px"><span class="dot dot-empty"></span> ${lbl}</div>` + renderMethodsTable(otherStatic, cls);
  }
  return html;
}

function renderMethodsTable(methods, cls) {
  if (!methods.length) return '';
  const rows = methods.map(m => {
    const params = m.params.map(p =>
      `<span class="param-type">${esc(p.type)}</span> <span class="param-name">${esc(p.name)}</span>`
    ).join(', ');
    const staticTag = m.static ? `<span class="tag-static" style="margin-left:5px">static</span>` : '';
    return `<tr>
      <td><a class="method-link" data-method="${esc(m.name)}">${esc(m.name)}</a>${staticTag}</td>
      <td><span class="return-type">${esc(m.return_type)}</span></td>
      <td><span class="params-cell">${params||'<span style="color:#444">—</span>'}</span></td>
    </tr>`;
  }).join('');
  const table = `<table><thead><tr><th>Method</th><th>Returns</th><th>Parameters</th></tr></thead><tbody>${rows}</tbody></table>`;
  setTimeout(() => {
    document.querySelectorAll('a.method-link[data-method]').forEach(a => {
      a.addEventListener('click', e => { e.preventDefault(); showSource(cls, a.dataset.method); });
    });
  }, 0);
  return table;
}

function renderFieldsTable(fields, isEnum) {
  if (!fields.length) return `<div class="empty-msg">No fields</div>`;
  if (isEnum) {
    return `<div style="padding:8px 0;line-height:2.2">${fields.map(f => `<span class="field-name" style="margin-right:12px">${esc(f.name)}</span>`).join('')}</div>`;
  }
  return `<table><thead><tr><th>Field</th><th>Type</th></tr></thead><tbody>${
    fields.map(f => {
      const dot = f.lua_tagged ? `<span class="dot dot-tagged" style="display:inline-block;margin-left:5px;vertical-align:middle" title="@UsedFromLua"></span>` : '';
      const staticTag = f.static ? `<span class="tag-static" style="margin-left:5px">static</span>` : '';
      return `<tr><td><span class="field-name">${esc(f.name)}</span>${dot}${staticTag}</td><td><span class="field-type">${esc(f.type)}</span></td></tr>`;
    }).join('')
  }</tbody></table>`;
}

// ── Globals panel ─────────────────────────────────────────────────────────
function showGlobalsPanel(show) {
  document.getElementById('globals-panel').classList.toggle('visible', show);
  document.getElementById('content-tabs').classList.toggle('visible', !show && currentClass !== null);
  document.getElementById('detail-panel').classList.toggle('visible', !show && currentCtab === 'detail' && currentClass !== null);
  document.getElementById('source-panel').classList.toggle('visible', !show && currentCtab === 'source' && currentClass !== null);
}

function initGlobals() {
  showGlobalsPanel(true);
  backToGlobalsTable();
  document.getElementById('placeholder').style.display = 'none';
  updateGlobalsTable('');
  const inp   = document.getElementById('globals-search');
  const fresh = inp.cloneNode(true);
  inp.parentNode.replaceChild(fresh, inp);
  fresh.value = '';
  fresh.addEventListener('input', () => updateGlobalsTable(fresh.value));
  fresh.focus();
}

function updateGlobalsTable(filter) {
  const s = filter.toLowerCase();
  const fns = API.global_functions
    .map((g, i) => ({g, i}))
    .filter(({g}) => !s || g.lua_name.toLowerCase().includes(s) || g.java_method.toLowerCase().includes(s));

  document.getElementById('globals-count').textContent = `${fns.length} functions`;

  let lastGroup = null;
  let rows = '';
  for (const {g} of fns) {
    const group = g.group || '';
    if (group !== lastGroup) {
      const folded = foldedGlobalGroups.has(group);
      rows += `<tr><td colspan="4" class="globals-group-header" data-group="${esc(group)}">
        <span class="ggh-arrow">${folded ? '▶' : '▼'}</span>
        <span class="ggh-name">${esc(group)}</span>
      </td></tr>`;
      lastGroup = group;
    }
    const folded = foldedGlobalGroups.has(group);
    const params = (g.params||[]).map(p =>
      `<span class="param-type">${esc(p.type)}</span> <span class="param-name">${esc(p.name)}</span>`
    ).join(', ');
    const alias = g.java_method !== g.lua_name
      ? `<span style="color:var(--text-dim);font-size:11px;margin-left:8px">← ${esc(g.java_method)}</span>` : '';
    rows += `<tr data-group="${esc(group)}"${folded?' style="display:none"':''}>
      <td><span class="gfn-name">${esc(g.lua_name)}</span>${alias}</td>
      <td><span class="return-type">${esc(g.return_type||'?')}</span></td>
      <td><span class="params-cell">${params||'<span style="color:#444">—</span>'}</span></td>
      <td><button class="src-btn" data-method="${esc(g.java_method)}" title="View source">{ }</button></td>
    </tr>`;
  }

  document.getElementById('globals-table-wrap').innerHTML =
    `<table style="margin-top:4px"><thead><tr><th>Lua name</th><th>Returns</th><th>Parameters</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;

  document.querySelectorAll('#globals-table-wrap .globals-group-header').forEach(hdr => {
    hdr.addEventListener('click', () => {
      const group = hdr.dataset.group;
      if (foldedGlobalGroups.has(group)) foldedGlobalGroups.delete(group);
      else foldedGlobalGroups.add(group);
      const folded = foldedGlobalGroups.has(group);
      hdr.querySelector('.ggh-arrow').textContent = folded ? '▶' : '▼';
      const wrap = document.getElementById('globals-table-wrap');
      wrap.querySelectorAll(`tr[data-group="${group}"]`).forEach(r => r.style.display = folded ? 'none' : '');
    });
  });
  document.querySelectorAll('#globals-table-wrap .src-btn').forEach(btn => {
    btn.addEventListener('click', () => showGlobalSource(btn.dataset.method));
  });
}

async function showGlobalSource(javaMethod) {
  const relPath = 'zombie/Lua/LuaManager.java';
  document.getElementById('globals-header').style.display  = 'none';
  document.getElementById('globals-nav').classList.add('visible');
  document.getElementById('globals-src-title').textContent = javaMethod;
  document.getElementById('globals-table-wrap').style.display = 'none';
  document.getElementById('globals-source-wrap').classList.add('visible');

  const codeEl = document.getElementById('globals-src-code');
  codeEl.textContent = 'Loading…';

  let text;
  try { text = await fetchSource(relPath); }
  catch(e) {
    codeEl.textContent = `// Source not available.\n// Error: ${e.message}`;
    Prism.highlightElement(codeEl);
    return;
  }

  renderFoldableSource(text, codeEl);
  scrollToMethod(text, javaMethod,
    document.getElementById('globals-src-pre'),
    document.getElementById('globals-src-code'));
}

function backToGlobalsTable() {
  document.getElementById('globals-header').style.display = '';
  document.getElementById('globals-nav').classList.remove('visible');
  document.getElementById('globals-table-wrap').style.display = '';
  document.getElementById('globals-source-wrap').classList.remove('visible');
}

// ── Events ────────────────────────────────────────────────────────────────
function setupEvents() {
  document.querySelectorAll('.tab').forEach(t =>
    t.addEventListener('click', () => switchTab(t.dataset.tab)));

  document.querySelectorAll('.ctab').forEach(t =>
    t.addEventListener('click', () => {
      if (!currentClass) return;
      if (t.dataset.ctab === 'source') showSource(API.classes[currentClass]);
      else switchCtab('detail');
    }));

  document.querySelectorAll('.filter-btn').forEach(btn =>
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      buildClassList();
    }));

  // Fold depth controls
  document.getElementById('btn-fold-all-pkg').addEventListener('click', () => {
    foldDepth = 0; foldedPackages.clear(); updateDepthLabel(); buildClassList();
  });
  document.getElementById('btn-unfold-all-pkg').addEventListener('click', () => {
    foldDepth = Infinity; foldedPackages.clear(); updateDepthLabel(); buildClassList();
  });
  document.getElementById('btn-fold-less').addEventListener('click', () => adjustFoldDepth(-1));
  document.getElementById('btn-fold-more').addEventListener('click', () => adjustFoldDepth(+1));

  // Global group fold buttons
  document.getElementById('btn-fold-groups').addEventListener('click', () => {
    document.querySelectorAll('#globals-table-wrap .globals-group-header').forEach(hdr => {
      foldedGlobalGroups.add(hdr.dataset.group);
    });
    updateGlobalsTable(document.getElementById('globals-search')?.value || '');
  });
  document.getElementById('btn-unfold-groups').addEventListener('click', () => {
    foldedGlobalGroups.clear();
    updateGlobalsTable(document.getElementById('globals-search')?.value || '');
  });

  // Globals back button
  document.getElementById('globals-back-btn').addEventListener('click', backToGlobalsTable);

  // Source toolbar — class source
  document.getElementById('src-fold-all').addEventListener('click', () =>
    foldAllInEl(document.getElementById('source-code'), 'all'));
  document.getElementById('src-unfold-all').addEventListener('click', () =>
    unfoldAllInEl(document.getElementById('source-code')));
  document.getElementById('src-fold-methods').addEventListener('click', () =>
    foldAllInEl(document.getElementById('source-code'), 'methods'));

  // Source toolbar — global source
  document.getElementById('gsrc-fold-all').addEventListener('click', () =>
    foldAllInEl(document.getElementById('globals-src-code'), 'all'));
  document.getElementById('gsrc-unfold-all').addEventListener('click', () =>
    unfoldAllInEl(document.getElementById('globals-src-code')));
  document.getElementById('gsrc-fold-methods').addEventListener('click', () =>
    foldAllInEl(document.getElementById('globals-src-code'), 'methods'));

  // Global search
  let timer;
  const searchEl = document.getElementById('global-search');
  searchEl.addEventListener('input', e => {
    clearTimeout(timer);
    timer = setTimeout(() => { currentSearch = e.target.value; buildClassList(); }, 150);
  });
  searchEl.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); navigateList(+1); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); navigateList(-1); }
    if (e.key === 'Enter')     { e.preventDefault(); searchEl.blur(); }
  });

  document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName;
    if (e.key === '/' && tag !== 'INPUT') { e.preventDefault(); searchEl.focus(); }
    if (e.key === 'Escape' && tag === 'INPUT') document.activeElement.blur();
    if (tag !== 'INPUT' && currentTab === 'classes') {
      if (e.key === 'ArrowDown') { e.preventDefault(); navigateList(+1); }
      if (e.key === 'ArrowUp')   { e.preventDefault(); navigateList(-1); }
    }
  });
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('sidebar').style.display = tab === 'classes' ? 'flex' : 'none';
  if (tab === 'globals') { initGlobals(); location.hash = 'globals'; }
  else {
    showGlobalsPanel(false);
    if (currentClass) renderClassDetail(currentClass);
    else document.getElementById('placeholder').style.display = 'flex';
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
