<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Zomboid Lua API</title>
<style>
  :root {
    --bg: #1a1a1a;
    --bg2: #242424;
    --bg3: #2e2e2e;
    --border: #3a3a3a;
    --text: #d4d4d4;
    --text-dim: #777;
    --accent: #c17f24;
    --accent2: #4a9eff;
    --green: #6abf69;
    --red: #e06c75;
    --col-exposed: #c17f24;
    --col-tagged: #6abf69;
    --sidebar-w: 320px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  #header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 15px; font-weight: 600; color: var(--accent); white-space: nowrap; }
  #global-search { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; color: var(--text); font-size: 13px; outline: none; }
  #global-search:focus { border-color: var(--accent); }
  #global-search::placeholder { color: var(--text-dim); }
  .hstat { font-size: 11px; color: var(--text-dim); white-space: nowrap; display: flex; align-items: center; gap: 5px; }
  .hstat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Tabs */
  #tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { padding: 8px 20px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-dim); font-size: 13px; user-select: none; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Layout */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

  /* Filter legend */
  #filter-legend { padding: 8px 10px 4px; font-size: 11px; color: var(--text-dim); display: flex; gap: 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; }

  /* Filter buttons */
  #sidebar-filters { padding: 6px 8px; display: flex; gap: 5px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  .filter-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; padding: 3px 8px; font-size: 11px; cursor: pointer; color: var(--text-dim); user-select: none; }
  .filter-btn:hover { color: var(--text); border-color: #555; }
  .filter-btn.active { color: #fff; }
  .filter-btn[data-filter="all"].active    { background: #444; border-color: #666; }
  .filter-btn[data-filter="both"].active   { background: #3a3a1a; border-color: var(--accent); color: var(--accent); }
  .filter-btn[data-filter="exposed"].active { background: #2a2a12; border-color: var(--col-exposed); color: var(--col-exposed); }
  .filter-btn[data-filter="tagged"].active  { background: #1a2e1a; border-color: var(--col-tagged); color: var(--col-tagged); }
  .filter-btn[data-filter="enum"].active   { background: #1a1a2e; border-color: #8888ff; color: #8888ff; }

  #class-count { padding: 4px 10px; font-size: 11px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
  #class-list { flex: 1; overflow-y: auto; }

  .class-item { padding: 6px 10px; cursor: pointer; border-bottom: 1px solid #1e1e1e; display: flex; align-items: center; gap: 6px; user-select: none; min-width: 0; }
  .class-item:hover { background: var(--bg3); }
  .class-item.active { background: #25220f; border-left: 3px solid var(--accent); padding-left: 7px; }
  .ci-text { flex: 1; min-width: 0; }
  .ci-name { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ci-pkg  { font-size: 10px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ci-dots { display: flex; gap: 3px; flex-shrink: 0; }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-exposed { background: var(--col-exposed); }
  .dot-tagged  { background: var(--col-tagged); }
  .dot-empty   { background: transparent; border: 1px solid var(--border); }
  .tag { font-size: 10px; border-radius: 3px; padding: 1px 4px; flex-shrink: 0; }
  .tag-enum { background: #1a1a3a; color: #8888ff; }

  /* Content */
  #content { flex: 1; overflow-y: auto; padding: 20px; }
  #placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); font-size: 15px; flex-direction: column; gap: 8px; }

  .class-header { margin-bottom: 20px; }
  .class-header h2 { font-size: 20px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .class-header .fqn { font-size: 12px; color: var(--text-dim); font-family: monospace; margin-bottom: 10px; }
  .class-header .badges { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
  .badge { font-size: 11px; border-radius: 3px; padding: 2px 8px; font-weight: 600; }
  .badge-exposed { background: #2a2a12; color: var(--col-exposed); border: 1px solid var(--col-exposed); }
  .badge-tagged  { background: #1a2e1a; color: var(--col-tagged);  border: 1px solid var(--col-tagged); }
  .badge-exposed-no { background: var(--bg3); color: var(--text-dim); border: 1px solid var(--border); }
  .badge-tagged-no  { background: var(--bg3); color: var(--text-dim); border: 1px solid var(--border); }
  .badge-enum    { background: #1a1a3a; color: #8888ff; border: 1px solid #8888ff; }
  .source { font-size: 11px; color: var(--text-dim); font-family: monospace; }

  .section { margin-bottom: 28px; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .section-header h3 { font-size: 13px; font-weight: 600; color: var(--text); }
  .section-header .count { font-size: 12px; color: var(--text-dim); }
  .section-sub { font-size: 11px; color: var(--text-dim); margin-left: auto; padding: 2px 6px; border-radius: 3px; background: var(--bg3); }
  .method-filter { background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; padding: 4px 8px; color: var(--text); font-size: 12px; outline: none; margin-left: auto; width: 160px; }
  .method-filter:focus { border-color: var(--accent2); }

  .methods-group-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 6px 10px 4px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .methods-group-label.tagged-label { color: var(--col-tagged); }
  .methods-group-label.other-label { color: #666; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 4px; }
  th { text-align: left; padding: 5px 10px; font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
  td { padding: 4px 10px; border-bottom: 1px solid #222; vertical-align: top; }
  tr:hover td { background: var(--bg2); }
  .method-name { color: var(--accent2); font-family: monospace; }
  .return-type { color: #b5cea8; font-family: monospace; font-size: 12px; }
  .params { font-family: monospace; font-size: 12px; color: var(--text-dim); }
  .param-type { color: #ce9178; }
  .param-name { color: var(--text); }
  .field-name { color: var(--green); font-family: monospace; }
  .field-type { color: #b5cea8; font-family: monospace; font-size: 12px; }

  /* Globals tab */
  #globals-panel { display: none; }
  .globals-search { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; color: var(--text); font-size: 13px; outline: none; width: 300px; margin-bottom: 4px; }
  .globals-search:focus { border-color: var(--accent); }
  #globals-count { font-size: 12px; color: var(--text-dim); margin-bottom: 14px; }
  .global-fn { padding: 5px 10px; border-bottom: 1px solid #222; font-family: monospace; font-size: 13px; display: flex; align-items: center; gap: 10px; }
  .global-fn:hover { background: var(--bg2); }
  .gfn-lua { color: var(--accent); }
  .gfn-java { color: var(--text-dim); font-size: 11px; }

  /* Loading */
  #loading { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 12px; color: var(--text-dim); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }

  .empty-msg { color: var(--text-dim); font-style: italic; padding: 10px 0; font-size: 13px; }
</style>
</head>
<body>

<div id="header">
  <h1>PZ Lua API</h1>
  <input id="global-search" type="text" placeholder="Search classes, methods, fields… (press /)" autocomplete="off">
  <span class="hstat"><span class="hstat-dot" style="background:var(--col-exposed)"></span><span id="stat-exposed">…</span> setExposed</span>
  <span class="hstat"><span class="hstat-dot" style="background:var(--col-tagged)"></span><span id="stat-tagged">…</span> @UsedFromLua</span>
  <span class="hstat" style="color:var(--text-dim)" id="stat-globals"></span>
</div>

<div id="tabs">
  <div class="tab active" data-tab="classes">Classes</div>
  <div class="tab" data-tab="globals">Global Functions</div>
</div>

<div id="main">
  <div id="sidebar">
    <div id="filter-legend">
      <span class="legend-item"><span class="dot dot-exposed"></span> setExposed (callable)</span>
      <span class="legend-item"><span class="dot dot-tagged"></span> @UsedFromLua (tagged)</span>
    </div>
    <div id="sidebar-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="both">Both</button>
      <button class="filter-btn" data-filter="exposed">setExposed</button>
      <button class="filter-btn" data-filter="tagged">@UsedFromLua</button>
      <button class="filter-btn" data-filter="enum">Enums</button>
    </div>
    <div id="class-count"></div>
    <div id="class-list"></div>
  </div>

  <div id="content">
    <div id="loading"><div class="spinner"></div><span>Loading lua_api.json…</span></div>
    <div id="placeholder" style="display:none">
      <span>Select a class from the list</span>
      <span style="font-size:12px;color:var(--text-dim)">Press / to search</span>
    </div>
    <div id="class-detail" style="display:none"></div>
    <div id="globals-panel"></div>
  </div>
</div>

<script>
let API = null;
let currentTab = 'classes';
let currentFilter = 'all';
let currentSearch = '';
let currentClass = null;
let methodSearch = '';

fetch('./lua_api.json')
  .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
  .then(data => {
    API = data;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('placeholder').style.display = 'flex';
    init();
  })
  .catch(e => {
    document.getElementById('loading').innerHTML =
      `<div style="color:#e06c75;text-align:center">Failed to load lua_api.json<br><small>${e.message}</small><br>
       <small style="color:var(--text-dim);margin-top:8px">Make sure lua_api.json is in the same directory as index.html</small></div>`;
  });

function init() {
  const m = API._meta;
  document.getElementById('stat-exposed').textContent = m.set_exposed_count;
  document.getElementById('stat-tagged').textContent = m.lua_tagged_count;
  document.getElementById('stat-globals').textContent = `${m.total_global_functions} globals`;
  buildClassList();
  setupEvents();
  if (location.hash) {
    const val = decodeURIComponent(location.hash.slice(1));
    if (val === 'globals') switchTab('globals');
    else selectClass(val);
  }
}

// ── Class list ─────────────────────────────────────────────────────────────
function buildClassList() {
  const search = currentSearch.toLowerCase();
  const entries = Object.entries(API.classes).filter(([fqn, cls]) => {
    if (currentFilter === 'both'    && !(cls.set_exposed && cls.lua_tagged)) return false;
    if (currentFilter === 'exposed' && !cls.set_exposed) return false;
    if (currentFilter === 'tagged'  && !cls.lua_tagged)  return false;
    if (currentFilter === 'enum'    && !cls.is_enum)      return false;
    if (search) {
      if (fqn.toLowerCase().includes(search)) return true;
      if (cls.methods.some(m => m.name.toLowerCase().includes(search))) return true;
      if (cls.fields.some(f => f.name.toLowerCase().includes(search))) return true;
      return false;
    }
    return true;
  }).sort(([a], [b]) => a.split('.').pop().localeCompare(b.split('.').pop()));

  document.getElementById('class-count').textContent = `${entries.length} classes`;

  const list = document.getElementById('class-list');
  const frag = document.createDocumentFragment();
  list.innerHTML = '';
  for (const [fqn, cls] of entries) {
    const parts = fqn.split('.');
    const simple = parts.pop();
    const pkg = parts.join('.');
    const div = document.createElement('div');
    div.className = 'class-item' + (fqn === currentClass ? ' active' : '');
    div.dataset.fqn = fqn;
    div.innerHTML =
      `<div class="ci-text">` +
        `<div class="ci-name">${esc(simple)}${cls.is_enum ? ' <span class="tag tag-enum">enum</span>' : ''}</div>` +
        `<div class="ci-pkg">${esc(pkg)}</div>` +
      `</div>` +
      `<div class="ci-dots">` +
        `<span class="dot ${cls.set_exposed ? 'dot-exposed' : 'dot-empty'}" title="${cls.set_exposed ? 'setExposed' : 'not setExposed'}"></span>` +
        `<span class="dot ${cls.lua_tagged  ? 'dot-tagged'  : 'dot-empty'}" title="${cls.lua_tagged  ? '@UsedFromLua' : 'not @UsedFromLua'}"></span>` +
      `</div>`;
    div.addEventListener('click', () => selectClass(fqn));
    frag.appendChild(div);
  }
  list.appendChild(frag);
}

// ── Class detail ───────────────────────────────────────────────────────────
function selectClass(fqn) {
  if (!API.classes[fqn]) return;
  currentClass = fqn;
  methodSearch = '';
  location.hash = encodeURIComponent(fqn);
  document.querySelectorAll('.class-item').forEach(el =>
    el.classList.toggle('active', el.dataset.fqn === fqn));
  const active = document.querySelector('.class-item.active');
  if (active) active.scrollIntoView({ block: 'nearest' });
  renderClassDetail(fqn);
}

function renderClassDetail(fqn) {
  const cls = API.classes[fqn];
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('globals-panel').style.display = 'none';
  const detail = document.getElementById('class-detail');
  detail.style.display = 'block';

  const simple = fqn.split('.').pop();
  const taggedMethods = cls.methods.filter(m => m.lua_tagged);
  const otherMethods  = cls.methods.filter(m => !m.lua_tagged);

  detail.innerHTML = `
    <div class="class-header">
      <h2>${esc(simple)}</h2>
      <div class="fqn">${esc(fqn)}</div>
      <div class="badges">
        ${cls.set_exposed
          ? `<span class="badge badge-exposed">setExposed</span>`
          : `<span class="badge badge-exposed-no">not setExposed</span>`}
        ${cls.lua_tagged
          ? `<span class="badge badge-tagged">@UsedFromLua</span>`
          : `<span class="badge badge-tagged-no">not @UsedFromLua</span>`}
        ${cls.is_enum ? `<span class="badge badge-enum">enum</span>` : ''}
      </div>
      <div class="source">${esc(cls.source_file)}</div>
    </div>

    <div class="section">
      <div class="section-header">
        <h3>Methods</h3>
        <span class="count" id="method-total-count">${cls.methods.length}</span>
        ${cls.methods.length > 0 ? `<input class="method-filter" type="text" id="method-search-input" placeholder="Filter…" autocomplete="off">` : ''}
      </div>
      <div id="methods-wrap">${renderMethodGroups(taggedMethods, otherMethods, cls.set_exposed)}</div>
    </div>

    <div class="section">
      <div class="section-header">
        <h3>${cls.is_enum ? 'Constants' : 'Fields'}</h3>
        <span class="count">${cls.fields.length}</span>
      </div>
      ${renderFieldsTable(cls.fields, cls.is_enum)}
    </div>
  `;

  const inp = document.getElementById('method-search-input');
  if (inp) {
    inp.addEventListener('input', () => {
      const s = inp.value.toLowerCase();
      const tm = cls.methods.filter(m => m.lua_tagged && (!s || m.name.toLowerCase().includes(s)));
      const om = cls.methods.filter(m => !m.lua_tagged && (!s || m.name.toLowerCase().includes(s)));
      document.getElementById('method-total-count').textContent = tm.length + om.length;
      document.getElementById('methods-wrap').innerHTML = renderMethodGroups(tm, om, cls.set_exposed);
    });
  }
}

function renderMethodGroups(tagged, other, setExposed) {
  if (tagged.length === 0 && other.length === 0)
    return `<div class="empty-msg">No methods</div>`;

  let html = '';

  if (tagged.length > 0) {
    html += `<div class="methods-group-label tagged-label">
      <span class="dot dot-tagged"></span> @UsedFromLua (${tagged.length})
    </div>` + renderMethodsTable(tagged);
  }

  if (other.length > 0) {
    const label = setExposed
      ? `Other callable — setExposed but not @UsedFromLua (${other.length})`
      : `Other public — not callable from Lua (${other.length})`;
    html += `<div class="methods-group-label other-label" style="margin-top:${tagged.length ? 14 : 0}px">
      <span class="dot dot-empty"></span> ${label}
    </div>` + renderMethodsTable(other);
  }

  return html;
}

function renderMethodsTable(methods) {
  if (!methods.length) return '';
  const rows = methods.map(m => {
    const params = m.params.map(p =>
      `<span class="param-type">${esc(p.type)}</span> <span class="param-name">${esc(p.name)}</span>`
    ).join(', ');
    return `<tr>
      <td><span class="method-name">${esc(m.name)}</span></td>
      <td><span class="return-type">${esc(m.return_type)}</span></td>
      <td><span class="params">${params || '<span style="color:#444">—</span>'}</span></td>
    </tr>`;
  }).join('');
  return `<table><thead><tr><th>Method</th><th>Returns</th><th>Parameters</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderFieldsTable(fields, isEnum) {
  if (!fields.length) return `<div class="empty-msg">No ${isEnum ? 'constants' : 'fields'}</div>`;
  if (isEnum) {
    return `<div style="padding:8px 0;line-height:2.2">` +
      fields.map(f => `<span class="field-name" style="margin-right:14px">${esc(f.name)}</span>`).join('') +
      `</div>`;
  }
  const rows = fields.map(f => {
    const dotHtml = f.lua_tagged
      ? `<span class="dot dot-tagged" style="display:inline-block;margin-left:5px;vertical-align:middle" title="@UsedFromLua"></span>`
      : '';
    return `<tr>
      <td><span class="field-name">${esc(f.name)}</span>${dotHtml}</td>
      <td><span class="field-type">${esc(f.type)}</span></td>
    </tr>`;
  }).join('');
  return `<table><thead><tr><th>Field</th><th>Type</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ── Globals panel ──────────────────────────────────────────────────────────
function renderGlobals(filter) {
  filter = filter || '';
  const fl = filter.toLowerCase();
  const fns = API.global_functions.filter(g =>
    !fl || g.lua_name.toLowerCase().includes(fl) || g.java_method.toLowerCase().includes(fl)
  );
  const panel = document.getElementById('globals-panel');
  panel.style.display = 'block';
  document.getElementById('class-detail').style.display = 'none';
  document.getElementById('placeholder').style.display = 'none';
  panel.innerHTML =
    `<input class="globals-search" type="text" id="globals-search-inp" placeholder="Search global functions…" value="${esc(filter)}" autocomplete="off">` +
    `<div id="globals-count">${fns.length} functions</div>` +
    `<div>` +
    fns.map(g =>
      `<div class="global-fn">
        <span class="gfn-lua">${esc(g.lua_name)}</span>
        ${g.java_method !== g.lua_name ? `<span class="gfn-java">← ${esc(g.java_method)}</span>` : ''}
      </div>`
    ).join('') +
    `</div>`;
  document.getElementById('globals-search-inp').addEventListener('input', e => renderGlobals(e.target.value));
}

// ── Events ─────────────────────────────────────────────────────────────────
function setupEvents() {
  document.querySelectorAll('.tab').forEach(t =>
    t.addEventListener('click', () => switchTab(t.dataset.tab)));

  document.querySelectorAll('.filter-btn').forEach(btn =>
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      buildClassList();
    }));

  let timer;
  document.getElementById('global-search').addEventListener('input', e => {
    clearTimeout(timer);
    timer = setTimeout(() => { currentSearch = e.target.value; buildClassList(); }, 150);
  });

  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('global-search').focus();
    }
    if (e.key === 'Escape' && document.activeElement.tagName === 'INPUT') {
      document.activeElement.blur();
    }
  });
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('sidebar').style.display = tab === 'classes' ? 'flex' : 'none';
  if (tab === 'globals') {
    renderGlobals('');
    location.hash = 'globals';
  } else {
    document.getElementById('globals-panel').style.display = 'none';
    if (currentClass) renderClassDetail(currentClass);
    else document.getElementById('placeholder').style.display = 'flex';
  }
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
